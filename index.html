<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港四天三夜準備清單 (7/9 - 7/12)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        primary: '#8c9c9c', // Morandi color
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom checkbox style for a more polished look */
        input[type="checkbox"] {
            accent-color: #8c9c9c;
        }
        /* Smooth transitions */
        .transition-all-ease {
            transition: all 0.3s ease;
        }
        /* Hide scrollbar for clean modal */
        body.modal-open {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-[#f0f2f0] text-slate-800 font-sans min-h-screen pb-12 antialiased">

    <!-- Header Section -->
    <header class="bg-[#8c9c9c] text-white shadow-md rounded-b-3xl">
        <div class="max-w-3xl mx-auto px-6 py-8">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl md:text-3xl font-bold tracking-wide">
                    <i class="fa-solid fa-plane-departure mr-2"></i> 香港四天三夜準備清單
                </h1>
                <span class="bg-white/20 px-3 py-1 rounded-full text-sm font-medium">7/9 - 7/12</span>
            </div>
            <p class="text-white/90 text-lg md:text-xl mb-6">☀️ 🏖️ 📱 ✨</p>
            
            <!-- Progress Bar -->
            <div class="bg-white/20 rounded-full h-4 mb-2 overflow-hidden backdrop-blur-sm shadow-inner">
                <div id="progress-bar" class="bg-yellow-400 h-full rounded-full transition-all-ease" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-sm font-medium">
                <span>準備進度</span>
                <span id="progress-text">0%</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-3xl mx-auto px-4 sm:px-6 mt-8" id="checklist-container">
        <!-- JS will populate categories here -->
    </main>

    <!-- Floating Action Button for Reset -->
    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-red-500 hover:bg-red-600 text-white p-4 rounded-full shadow-lg transition-transform hover:scale-105 flex items-center justify-center" aria-label="重設清單">
        <i class="fa-solid fa-rotate-right text-xl"></i>
    </button>

    <!-- Custom Modal for Reset Confirmation -->
    <div id="reset-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity opacity-0 transition-all-ease">
        <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8 max-w-sm w-full mx-4 transform scale-95 transition-transform transition-all-ease" id="modal-content">
            <div class="text-center mb-6">
                <div class="bg-red-100 text-red-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">確定要重設嗎？</h2>
                <p class="text-gray-500">這將會清除所有已勾選的進度，無法復原。</p>
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 px-4 rounded-xl transition-colors">
                    取消
                </button>
                <button onclick="resetChecklist()" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-sm shadow-red-200">
                    確定清除
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data Structure for the Checklist
        const checklistData = [
            {
                id: 'cat-docs',
                title: '必備證件與重要申報 (強烈建議盡早完成)',
                icon: 'fa-passport text-blue-500',
                items: [
                    { id: 'doc-1', text: '護照 (效期需在 6 個月以上)' },
                    { id: 'doc-2', text: '入境簽證 (擇一：印出紙本「台灣居民預辦入境登記」或 帶「台胞證」)' },
                    { id: 'doc-3', text: '電子機票憑證 (存手機截圖，建議印紙本備用)' },
                    { id: 'doc-4', text: '飯店訂房確認信 (存手機截圖，建議印紙本備用)' }
                ]
            },
            {
                id: 'cat-finance',
                title: '金融與網路準備',
                icon: 'fa-wallet text-emerald-500',
                items: [
                    { id: 'fin-1', text: '港幣現金 (建議每人 $1,000 - $1,500 港幣，應付傳統小吃與計程車)' },
                    { id: 'fin-2', text: '八達通卡 (推薦手機下載「Octopus 八達通」綁定 Apple Pay/信用卡，或到當地買實體卡)' },
                    { id: 'fin-3', text: '海外刷卡信用卡 (1-2張，確認已開通海外刷卡功能)' },
                    { id: 'fin-4', text: '網路 SIM卡/eSIM (注意：到香港連網後務必依簡訊完成「實名認證」才能上網)' }
                ]
            },
            {
                id: 'cat-clothes',
                title: '7月炎夏行李清單 (衣物與隨身物品)',
                icon: 'fa-suitcase text-amber-500',
                items: [
                    { id: 'lug-1', text: '短袖、短褲 (排汗透氣材質為主)' },
                    { id: 'lug-2', text: '<span class="text-red-500 font-bold">薄外套 / 薄長袖</span> (必帶！室內地鐵商場冷氣極強，溫差大)' },
                    { id: 'lug-3', text: '好走路的平底鞋/球鞋 (香港需大量步行與爬坡)' },
                    { id: 'lug-4', text: '小摺疊傘 / 輕便雨衣 (防曬兼防夏季午後雷陣雨)' },
                    { id: 'lug-5', text: '萬國轉接頭 (英規三腳大扁插頭 G型，220V)' },
                    { id: 'lug-6', text: '行動電源與充電線 (查地圖、拍照必備)' },
                    { id: 'lug-7', text: '防曬用品 (防曬乳、墨鏡、遮陽帽)' },
                    { id: 'lug-8', text: '個人常備藥品 (感冒藥、腸胃藥、OK繃)' },
                    { id: 'lug-9', text: '防蚊液 (如有安排太平山或郊外行程)' }
                ]
            },
            {
                id: 'cat-apps',
                title: '手機必備智慧 App (建議出發前下載)',
                icon: 'fa-mobile-screen-button text-purple-500',
                items: [
                    { id: 'app-1', text: 'OpenRice 開飯喇 (查餐廳評價、菜單必備)' },
                    { id: 'app-2', text: 'MTR Mobile (香港地鐵官方 App，查路線與票價)' },
                    { id: 'app-3', text: 'HKTaxi 或 Uber (叫車必備)' },
                    { id: 'app-4', text: 'Google Maps (走路導航神隊友)' }
                ]
            }
        ];

        let savedProgress = JSON.parse(localStorage.getItem('hkChecklistProgress')) || {};

        // Generate the DOM
        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';

            checklistData.forEach(category => {
                // Category Card
                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-sm mb-6 overflow-hidden border border-slate-200/60';
                
                // Category Header
                const header = document.createElement('div');
                header.className = 'bg-slate-50 border-b border-slate-100 px-5 py-4 flex items-center gap-3';
                header.innerHTML = `
                    <i class="fa-solid ${category.icon} text-xl w-6 text-center"></i>
                    <h2 class="text-lg font-bold text-slate-800">${category.title}</h2>
                `;
                card.appendChild(header);

                // Items List
                const list = document.createElement('div');
                list.className = 'p-3 sm:p-5 flex flex-col gap-1';

                category.items.forEach(item => {
                    const isChecked = savedProgress[item.id] || false;
                    
                    const label = document.createElement('label');
                    label.className = 'flex items-start gap-4 p-3 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors group select-none';
                    
                    const checkboxDiv = document.createElement('div');
                    checkboxDiv.className = 'pt-0.5 relative';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = item.id;
                    checkbox.className = 'peer w-5 h-5 rounded border-slate-300 cursor-pointer shadow-sm';
                    checkbox.checked = isChecked;
                    checkbox.onchange = () => toggleItem(item.id, checkbox.checked);
                    
                    const textSpan = document.createElement('span');
                    textSpan.className = `text-base sm:text-lg text-slate-700 transition-all ${isChecked ? 'line-through text-slate-400 opacity-60' : ''}`;
                    textSpan.innerHTML = item.text;

                    // Add elements
                    checkboxDiv.appendChild(checkbox);
                    label.appendChild(checkboxDiv);
                    label.appendChild(textSpan);
                    list.appendChild(label);
                    
                    // Sync text style on change
                    checkbox.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            textSpan.classList.add('line-through', 'text-slate-400', 'opacity-60');
                        } else {
                            textSpan.classList.remove('line-through', 'text-slate-400', 'opacity-60');
                        }
                    });
                });

                card.appendChild(list);
                container.appendChild(card);
            });

            updateProgress();
        }

        // Handle Toggle
        function toggleItem(id, isChecked) {
            savedProgress[id] = isChecked;
            localStorage.setItem('hkChecklistProgress', JSON.stringify(savedProgress));
            updateProgress();
        }

        // Update Progress Bar
        function updateProgress() {
            let totalItems = 0;
            let checkedItems = 0;

            checklistData.forEach(category => {
                category.items.forEach(item => {
                    totalItems++;
                    if (savedProgress[item.id]) {
                        checkedItems++;
                    }
                });
            });

            const percentage = totalItems === 0 ? 0 : Math.round((checkedItems / totalItems) * 100);
            
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            
            progressBar.style.width = `${percentage}%`;
            progressText.innerText = `${percentage}% (${checkedItems}/${totalItems})`;
            
            // Change color based on completion
            if (percentage === 100) {
                progressBar.classList.remove('bg-yellow-400');
                progressBar.classList.add('bg-green-400');
            } else {
                progressBar.classList.add('bg-yellow-400');
                progressBar.classList.remove('bg-green-400');
            }
        }

        // Modal Logic
        const modal = document.getElementById('reset-modal');
        const modalContent = document.getElementById('modal-content');

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.classList.add('modal-open');
            // Slight delay for animation
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            document.body.classList.remove('modal-open');
            // Wait for animation to finish
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function resetChecklist() {
            savedProgress = {};
            localStorage.removeItem('hkChecklistProgress');
            renderChecklist();
            closeModal();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderChecklist);

    </script>
</body>
</html>
